spring:
  application:
    name: ticketing

  datasource:
    url: jdbc:mysql://localhost:3307/ticketing?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ticketing
    password: ticketing
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info